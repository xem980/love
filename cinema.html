<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>...</title>
<style>
body {background:black; color:white; display:flex; justify-content:center; align-items:center; height:100vh; text-align:center;}
#text {font-size:28px; max-width:80%;}
.fade {opacity:0; transition:1.5s;}
.show {opacity:1;}
</style>
</head>

<body>
<div id="text"></div>
<source src="music.mp3" autoplay loop>
<script>
const lines=[
"พี่บัว...",
"ตั้งแต่มีพี่เข้ามา",
"ชีวิตผมมีความหมายมากขึ้น",
"ทุกวันมันมีความสุขขึ้นจริงๆนะพี่",
"",
"ผมอาจไม่เก่งที่สุด",
"แต่ผมจะตั้งใจรักพี่ให้ดีที่สุด",
"",
"ขอบคุณที่มาคบกับผมนะคับ 💕",
"",
"ผมมีคำถามจะถาม..."
];

let i=0;
let text=document.getElementById("text");

function next(){
  if(i<lines.length){
    let p=document.createElement("div");
    p.innerText=lines[i];
    p.classList.add("fade");
    text.innerHTML="";
    text.appendChild(p);
    setTimeout(()=>p.classList.add("show"),100);
    i++;
    setTimeout(next,2500);
  }else{
    setTimeout(()=>{
      window.location.href="question.html";
    },2000);
  }
}
next();
</script>
</body>
</html>
